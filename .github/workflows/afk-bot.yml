name: Minecraft AFK Bot

on:
  # Manual trigger
  workflow_dispatch:
  # Run on schedule (every 6 hours, but bot will restart itself every ~6 hours)
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  # Auto-restart when a run completes
  workflow_run:
    workflows: ["Minecraft AFK Bot"]
    types:
      - completed

# Prevent concurrent runs - one bot at a time
concurrency:
  group: afk-bot
  cancel-in-progress: false

jobs:
  run-afk-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hours hard limit (GitHub Actions max is 6 hours for free tier)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create bot configuration
        run: |
          echo "=========================================="
          echo "      Minecraft AFK Bot Starting        "
          echo "=========================================="
          echo "Bot Username: ${{ env.BOT_USERNAME }}"
          echo "Server: ${{ env.SERVER_HOST }}"
          echo "Version: ${{ env.SERVER_VERSION }}"
          echo "AuthMe: Auto-generate password enabled"
          echo "Max Runtime: 350 minutes (5h 50m)"
          echo "=========================================="
        env:
          BOT_USERNAME: ${{ secrets.BOT_USERNAME || 'AFKBot_GH' }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '25565' }}
          SERVER_VERSION: ${{ secrets.SERVER_VERSION || '1.20.1' }}
          AUTH_TYPE: ${{ secrets.AUTH_TYPE || 'offline' }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}

      - name: Run AFK Bot
        run: npm start
        env:
          BOT_USERNAME: ${{ secrets.BOT_USERNAME || 'AFKBot_GH' }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '25565' }}
          SERVER_VERSION: ${{ secrets.SERVER_VERSION || '1.20.1' }}
          AUTH_TYPE: ${{ secrets.AUTH_TYPE || 'offline' }}
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          NODE_ENV: production

      - name: Bot completed - preparing for restart
        if: always()
        run: |
          echo "=========================================="
          echo "    AFK Bot run completed                "
          echo "    Time: $(date -u)                     "
          echo "    Triggering next run...               "
          echo "=========================================="

      - name: Trigger next workflow run
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'afk-bot.yml',
              ref: context.ref
            });
            console.log('Triggered next workflow run:', data);

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: |
            *.log
            npm-debug.log*
          retention-days: 7
