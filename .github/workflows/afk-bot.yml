name: FalixNodes AFK Bot

on:
  schedule:
    - cron: '0 */5 * * *'
    - cron: '45 */6 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual run'

concurrency:
  group: afk-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 345

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        npm install mineflayer mineflayer-pathfinder minecraft-data

    - name: Restore bot password
      uses: actions/cache@v4
      with:
        path: .bot_password
        key: bot-password-${{ github.repository }}
        restore-keys: |
          bot-password-

    - name: Run AFK Bot
      timeout-minutes: 340
      env:
        BOT_USERNAME: COOLBOI
        SERVER_HOST: pathborn.falix.me
        SERVER_PORT: 24233
        SERVER_VERSION: 1.20.1
        AUTH_TYPE: offline
      run: |
        echo "=========================================="
        echo "       Starting COOLBOI AFK Bot          "
        echo "=========================================="
        echo "Server: pathborn.falix.me:24233"
        echo "Bot Name: COOLBOI"
        echo "Max Runtime: 5 hours 40 minutes"
        echo "=========================================="

        (sleep $((5*3600 + 40*60)) && echo "TIMEOUT: 5h 40m reached. Stopping..." && pkill -f "node bot.js" || true) &
        TIMEOUT_PID=$!

        node bot.js
        EXIT_CODE=$?

        kill $TIMEOUT_PID 2>/dev/null || true
        echo "Bot exited with code: $EXIT_CODE"

    - name: Save bot password for next run
      uses: actions/cache@v4
      if: always()
      with:
        path: .bot_password
        key: bot-password-${{ github.repository }}-${{ github.run_id }}
        restore-keys: |
          bot-password-${{ github.repository }}-

    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: bot-logs-${{ github.run_id }}
        path: |
          *.log
          .bot_password
        retention-days: 7

  restart-bot:
    runs-on: ubuntu-latest
    needs: run-bot
    if: always()
    steps:
    - name: Trigger new workflow run
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Previous run completed. Scheduling restart in 5 minutes..."
        sleep 300
        curl -X POST \
          -H "Authorization: token $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/actions/workflows/afk-bot.yml/dispatches \
          -d '{"ref":"${{ github.ref }}"}'
