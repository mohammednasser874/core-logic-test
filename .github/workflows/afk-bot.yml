name: COOLBOI AFK Bot
on:
  schedule:
    - cron: '0 */5 * * *'
    - cron: '45 */6 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual run'

concurrency:
  group: afk-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 345
    if: vars.BOT_ENABLED == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install mineflayer mineflayer-pathfinder minecraft-data mineflayer-auto-eat

      - name: Install and connect Cloudflare WARP
        run: |
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -qq && sudo apt-get install -y cloudflare-warp
          sudo systemctl start warp-svc
          sleep 3
          warp-cli --accept-tos registration new
          sleep 2
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          sleep 5
          warp-cli --accept-tos status
          echo "Outbound IP:"
          curl -4s https://ifconfig.me

      - name: Restore bot password
        uses: actions/cache@v4
        with:
          path: .bot_password
          key: bot-password-${{ github.repository }}
          restore-keys: |
            bot-password-

      - name: Run AFK Bot
        timeout-minutes: 340
        env:
          BOT_USERNAME: COOLBOI
          SERVER_HOST: midnightsmp.axyron.cloud
          SERVER_PORT: 25565
          SERVER_VERSION: 1.21.1
          AUTH_TYPE: offline
          BOT_PASSWORD: ${{ secrets.BOT_PASSWORD }}
          NODE_OPTIONS: "--dns-result-order=ipv4first"
        run: |
          echo "=========================================="
          echo "       Starting COOLBOI AFK Bot          "
          echo "=========================================="
          echo "Server : midnightsmp.axyron.cloud:25565"
          echo "Bot    : COOLBOI"
          echo "Runtime: max 5h 40m"
          echo "=========================================="
          (sleep $((5*3600 + 40*60)) && echo "TIMEOUT: 5h 40m reached. Stopping..." && pkill -f "node bot.js" || true) &
          TIMEOUT_PID=$!
          node bot.js
          EXIT_CODE=$?
          kill $TIMEOUT_PID 2>/dev/null || true
          echo "Bot exited with code: $EXIT_CODE"

      - name: Save bot password for next run
        uses: actions/cache@v4
        if: always()
        with:
          path: .bot_password
          key: bot-password-${{ github.repository }}-${{ github.run_id }}
          restore-keys: |
            bot-password-${{ github.repository }}-

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: |
            *.log
            .bot_password
          retention-days: 7

  restart-bot:
    runs-on: ubuntu-latest
    needs: run-bot
    if: always() && vars.BOT_ENABLED == 'true'
    steps:
      - name: Trigger new workflow run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Scheduling restart in 3 minutes..."
          sleep 180
          curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/afk-bot.yml/dispatches \
            -d '{"ref":"${{ github.ref }}"}'
